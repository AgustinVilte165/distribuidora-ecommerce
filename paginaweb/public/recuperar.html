<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Recuperar contraseña - Market Electro Express</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .auth-container {
      max-width: 400px;
      margin: 100px auto;
      text-align: center;
    }

    .extra-link {
      margin-top: 15px;
      font-size: 14px;
    }

    .extra-link a {
      color: #007bff;
      text-decoration: none;
    }

    .extra-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

<div class="auth-container">

  <h2>Recuperar contraseña</h2>

  <p>Ingresá tu correo y tu nueva contraseña.</p>

  <form action="/recuperar-password" method="POST">
    <input type="email" name="email" placeholder="Correo electrónico" required>
    <input type="password" name="nuevaPassword" placeholder="Nueva contraseña" required>
    <button type="submit">Cambiar contraseña</button>
  </form>

  <div class="extra-link">
    <a href="/login.html">← Volver al inicio de sesión</a>
  </div>

</div>

</body>
</html>
